<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio DOM</title>
    <link rel="stylesheet" href="style.css">
   
   <style>
        /* Aggiungi qui il tuo CSS */

    </style>
</head>
<body>

<div class="header-spacer">
        <h1>Scorri verso il basso per i risultati ↓</h1>
    </div>

    <div class="container-stats">
        <div class="stat-card">
            <span class="counter" data-target="150">0</span>
            <span class="label">Clienti Felici</span>
        </div>

        <div class="stat-card">
            <span class="counter" data-target="320">0</span>
            <span class="label">Progetti Conclusi</span>
        </div>

        <div class="stat-card">
            <span class="counter" data-target="12">0</span>
            <span class="label">Anni Esperienza</span>
        </div>
    </div>

    <div class="header-spacer"></div>

    <script>
        // Funzione che gestisce il conteggio progressivo
        const startCounter = (el) => {
            const target = parseInt(el.getAttribute('data-target'));
            const duration = 2000; // Durata totale dell'animazione in millisecondi (2 secondi)
            const stepTime = 20; // Frequenza di aggiornamento
            const totalSteps = duration / stepTime;
            const increment = target / totalSteps;
            
            let current = 0;

            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    el.innerText = target;
                    clearInterval(timer);
                } else {
                    el.innerText = Math.floor(current);
                }
            }, stepTime);
        };

        // Configurazione dell'Observer (rileva quando l'elemento entra nella vista)
        const observerOptions = {
            threshold: 0.6 // L'animazione parte quando il 60% della card è visibile
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    startCounter(entry.target);
                    observer.unobserve(entry.target); // Ferma l'osservazione (anima una sola volta)
                }
            });
        }, observerOptions);

        // Seleziona tutti i contatori e avvia l'osservatore
        document.querySelectorAll('.counter').forEach(counter => {
            observer.observe(counter);
        });
    </script>


</body>
</html>
